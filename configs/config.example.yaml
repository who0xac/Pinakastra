# Pinakastra Configuration
# Copy this file to ~/.pinakastra/config.yaml and fill in your values

# API Keys
api_keys:
  shodan_api_key: ""
  chaos_api_key: ""
  github_token: ""
  gitlab_token: ""
  telegram_bot_token: ""
  telegram_chat_id: ""

# Paths
paths:
  resolvers: "~/.pinakastra/resolvers.txt"
  subdomains_wordlist: "~/.pinakastra/wordlists/subdomains.txt"
  directories_wordlist: "~/.pinakastra/wordlists/directories.txt"
  amass_config: "~/.config/amass/config.yaml"
  jsa_path: "~/tools/JSA"

# Storage
storage:
  base_path: "~/recon-results"

# Notifications
notifications:
  telegram: false
  desktop: false
  telegram_bot_token: ""
  telegram_chat_id: ""
